# DEDUP test suite - Windows, macOS, Linux
name: Tests

on:
  push:
    branches: [main, refactor/phase-1-align-config-docs]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and optional deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install xxhash send2trash

      - name: Run tests
        run: python -m pytest dedup/tests -v --tb=short
